name: test

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m unittest discover -s tests -v
      - run: python3 scripts/validate-workspace.py --workspace examples/builder-graph
      - run: python3 scripts/render-graph.py --workspace examples/builder-graph
      - run: git diff --exit-code
